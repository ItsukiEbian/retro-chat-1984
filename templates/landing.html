<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Video Desk — 自習室へようこそ</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body class="page-auth">
    <div class="auth-center">
        <div class="auth-card">
            <div class="auth-card-header">
                <span class="auth-logo">◉</span>
                <h1>自習室へ入室</h1>
                <p>表示名を入力して入室してください</p>
            </div>
            <form method="post" action="{{ url_for('enter') }}" class="auth-form">
                {% if error %}
                <p class="auth-error">{{ error }}</p>
                {% endif %}
                {% if room_from_url %}
                <input type="hidden" name="room" value="{{ room_from_url }}">
                {% endif %}
                <label class="auth-label" for="name">名前</label>
                <input type="text" id="name" name="name" class="auth-input" placeholder="表示名を入力" maxlength="50" required autofocus>
                <button type="submit" class="btn-primary auth-submit">入室する</button>
            </form>
        </div>
    </div>
</body>
</html>
